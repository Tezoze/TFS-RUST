name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # sqlx `query!` metadata lives in `.sqlx/` (see `cargo sqlx prepare`); no DB needed in CI.
  SQLX_OFFLINE: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Check Formatting
      run: cargo fmt --all -- --check
      
    - name: Run Clippy
      run: cargo clippy --workspace -- -D warnings
      
    - name: Run Tests
      # Note: We run the workspace tests
      run: cargo test --workspace
